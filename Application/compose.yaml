    #ports:
    #  - "82:82"
    #command: sh -c "chmod +x run.sh && ./run.sh"
    #container_name: Back_End_test
    build:
      context: .
      dockerfile: F1_Server/Dockerfile
    ports:
      - "8001:8001"
  redis:
    image: "redis:alpine"
       
    stdin_open: true
    tty: true
    container_name: F1_Server



  database:
    image: mongo:7.0.3
    ports:
      - 83:27017
    volumes:
      - ./dbdata:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: username
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_URL: mongodb://username:password@database:27017/users?authSource=admin
  
    