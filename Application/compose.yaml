services:
  
  react-app:
    build:
      context: .
      dockerfile: Front_End/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./Front_End/react_front_end:/app
      - /app/node_modules
    environment:
     
      - NODE_ENV=development
       
    stdin_open: true
    tty: true
    container_name: Front_End_test
    
  web:
    #image: node:24.12.0
    #environment:
    #  - MONGO_URL=mongodb://username:password@database:27017/users?authSource=admin
    #  - MONGO_URL_BOOKS=mongodb://username:password@database:27017/Books?authSource=admin
    #  - MONGO_URL_STAFF=mongodb://username:password@database:27017/staff?authSource=admin
    #volumes:
