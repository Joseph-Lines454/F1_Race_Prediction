services:
  
  react-app:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /Front_End/my-react-app/app/node_modules
    stdin_open: true
    tty: true
    container_name: Front_End_F1
  web:
   build: .
   ports:
      - "8000:5000"
  redis:
    image: "redis:alpine"

  database:
    image: mongo:7.0.3
    ports:
      - 83:27017
    volumes:
      - ./dbdata:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: username
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_URL: mongodb://username:password@database:27017/users?authSource=admin
      
  
    